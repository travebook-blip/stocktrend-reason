<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>籌碼控盤雷達 — 技術面 × 法人籌碼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06101e; --s1:#0b1a2c; --s2:#0f2236; --s3:#102a44;
  --bd:#173251; --bd2:#234c75;
  --tx:#dce8f5; --mut:#7e9bbd; --faint:#516a8a;
  --up:#ff4d5e;        /* 漲 / 多方 (台股紅) */
  --down:#00e0a0;      /* 跌 / 空方 (台股綠) */
  --foreign:#00c8ff;   /* 外資 */
  --trust:#ffb13d;     /* 投信 */
  --neutral:#3c5274;
  --shadow:0 6px 26px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans TC",sans-serif; background:var(--bg); color:var(--tx);
  line-height:1.5; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(1200px 600px at 80% -10%,rgba(0,200,255,.07),transparent),
                   radial-gradient(900px 500px at -10% 10%,rgba(255,177,61,.05),transparent);
  min-height:100vh;
}
.mono{font-family:"JetBrains Mono",monospace;font-variant-numeric:tabular-nums}
.wrap{max-width:1180px;margin:0 auto;padding:22px 18px 80px}

/* ── Header ── */
.hd{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding-bottom:16px;border-bottom:1px solid var(--bd)}
.hd .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.32em;
  color:var(--foreign);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.hd .eyebrow::before{content:"";width:26px;height:1px;background:var(--foreign);display:inline-block}
.hd h1{font-size:30px;font-weight:900;letter-spacing:.04em;margin-top:6px;
  background:linear-gradient(90deg,#fff,#9fd8ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.hd .sub{color:var(--mut);font-size:13px;margin-top:4px}
.modebadge{font-family:"JetBrains Mono",monospace;font-size:11px;padding:6px 12px;border-radius:20px;
  border:1px solid var(--bd2);background:var(--s2);color:var(--mut);white-space:nowrap}
.modebadge .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--faint);margin-right:6px;vertical-align:middle}
.modebadge.live .dot{background:var(--down);box-shadow:0 0 8px var(--down)}
.modebadge.demo .dot{background:var(--trust);box-shadow:0 0 8px var(--trust)}

/* ── Control panel ── */
.panel{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-top:18px;box-shadow:var(--shadow)}
.panel .ph{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;color:var(--faint);
  text-transform:uppercase;margin-bottom:10px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
textarea{width:100%;min-height:78px;resize:vertical;background:var(--bg);border:1px solid var(--bd2);
  border-radius:10px;color:var(--tx);padding:11px 13px;font-family:"JetBrains Mono",monospace;font-size:13px;line-height:1.7}
textarea:focus{outline:none;border-color:var(--foreign);box-shadow:0 0 0 3px rgba(0,200,255,.12)}
.opts{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:12px}
.seg{display:inline-flex;border:1px solid var(--bd2);border-radius:9px;overflow:hidden}
.seg button{background:var(--s2);color:var(--mut);border:none;padding:8px 14px;font-size:12.5px;cursor:pointer;
  font-family:inherit;transition:.15s}
.seg button.on{background:var(--foreign);color:#02131c;font-weight:700}
.seg button:not(.on):hover{color:var(--tx);background:var(--s3)}
.proxy{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--faint)}
.proxy input{background:var(--bg);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);
  padding:7px 10px;font-family:"JetBrains Mono",monospace;font-size:11.5px;width:230px}
.btn{font-family:inherit;font-weight:700;border:none;border-radius:10px;cursor:pointer;padding:10px 18px;font-size:13.5px;transition:.15s}
.btn.primary{background:linear-gradient(135deg,var(--foreign),#3aa0ff);color:#02131c}
.btn.primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn.ghost{background:var(--s2);color:var(--tx);border:1px solid var(--bd2)}
.btn.ghost:hover{border-color:var(--foreign);color:var(--foreign)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.status{margin-top:12px;font-size:12.5px;color:var(--mut);min-height:18px;font-family:"JetBrains Mono",monospace}
.status .err{color:var(--up)} .status .ok{color:var(--down)}

/* ── Summary ── */
.summary{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 4px}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:11px 15px;min-width:96px}
.stat .n{font-family:"JetBrains Mono",monospace;font-size:22px;font-weight:700}
.stat .l{font-size:11px;color:var(--mut);margin-top:2px}
.stat.foreign .n{color:var(--foreign)} .stat.trust .n{color:var(--trust)}
.stat.bull .n{color:var(--up)} .stat.gold .n{color:var(--down)}

/* ── Filters ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 6px}
.fchip{font-size:12px;padding:6px 13px;border-radius:18px;border:1px solid var(--bd2);background:var(--s1);
  color:var(--mut);cursor:pointer;transition:.15s;font-family:inherit}
.fchip:hover{color:var(--tx)}
.fchip.on{background:var(--tx);color:var(--bg);border-color:var(--tx);font-weight:700}

/* ── Cards grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px;margin-top:14px}
.card{background:linear-gradient(180deg,var(--s1),#091624);border:1px solid var(--bd);border-radius:15px;
  padding:15px 16px 16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
.card.hidden{display:none}
.c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.c-id .code{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--foreign);letter-spacing:.04em}
.c-id .name{font-size:18px;font-weight:900;margin-top:1px}
.c-id .date{font-size:10.5px;color:var(--faint);font-family:"JetBrains Mono",monospace;margin-top:1px}
.c-px{text-align:right}
.c-px .px{font-family:"JetBrains Mono",monospace;font-size:23px;font-weight:700}
.c-px .chg{font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:500;margin-top:1px}
.c-px .vol{font-size:10.5px;color:var(--faint);margin-top:2px;font-family:"JetBrains Mono",monospace}
.up{color:var(--up)!important} .down{color:var(--down)!important}

.divider{height:1px;background:var(--bd);margin:0 -2px}

/* signal chips */
.sigs{display:flex;flex-wrap:wrap;gap:6px}
.sig{font-size:11.5px;padding:4px 9px;border-radius:7px;border:1px solid var(--neutral);
  color:var(--mut);background:rgba(60,82,116,.16);font-family:"JetBrains Mono",monospace;white-space:nowrap}
.sig.bull{color:var(--up);border-color:rgba(255,77,94,.45);background:rgba(255,77,94,.12)}
.sig.bear{color:var(--down);border-color:rgba(0,224,160,.4);background:rgba(0,224,160,.1)}

/* 控盤天平 signature */
.balance{background:var(--bg);border:1px solid var(--bd);border-radius:12px;padding:12px 13px 13px}
.bl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.bl-head .ttl{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase}
.ctlbadge{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:14px;font-family:"Noto Sans TC"}
.ctlbadge.f{color:#02131c;background:var(--foreign)}
.ctlbadge.t{color:#241400;background:var(--trust)}
.ctlbadge.n{color:var(--mut);background:var(--s3);border:1px solid var(--bd2)}
.bl-track{position:relative;height:34px;margin:6px 0 4px}
.bl-axis{position:absolute;top:50%;left:0;right:0;height:6px;transform:translateY(-50%);
  border-radius:6px;background:linear-gradient(90deg,rgba(0,200,255,.30),rgba(60,82,116,.25) 50%,rgba(255,177,61,.30))}
.bl-center{position:absolute;top:4px;bottom:4px;left:50%;width:1px;background:var(--bd2);transform:translateX(-.5px)}
.bl-knob{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;transform:translate(-50%,-50%);
  border:2px solid var(--bg);box-shadow:0 0 0 1px rgba(255,255,255,.15),0 0 12px rgba(0,0,0,.5);transition:left .5s cubic-bezier(.2,.8,.2,1)}
.bl-ends{display:flex;justify-content:space-between;font-size:11px;font-family:"JetBrains Mono",monospace}
.bl-ends .f{color:var(--foreign)} .bl-ends .t{color:var(--trust)}
.verdict{font-size:12.5px;color:var(--tx);margin-top:9px;line-height:1.55}
.verdict b{color:#fff}

/* 法人 table */
.insttab{width:100%;border-collapse:collapse;font-family:"JetBrains Mono",monospace}
.insttab th,.insttab td{padding:6px 4px;text-align:right;font-size:12px;border-bottom:1px solid var(--bd)}
.insttab th{color:var(--faint);font-weight:500;font-size:10.5px;letter-spacing:.05em}
.insttab td:first-child,.insttab th:first-child{text-align:left}
.insttab tbody tr:last-child td{border-bottom:none}
.tag-f{color:var(--foreign);font-weight:700}.tag-t{color:var(--trust);font-weight:700}
.cons{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--s3);color:var(--mut)}
.cons.buy{color:var(--up)} .cons.sell{color:var(--down)}

.links{display:flex;gap:10px;flex-wrap:wrap;font-size:11px}
.links a{color:var(--faint);text-decoration:none;font-family:"JetBrains Mono",monospace}
.links a:hover{color:var(--foreign)}

.empty{text-align:center;color:var(--faint);padding:50px 20px;font-size:14px}
.foot{margin-top:34px;padding-top:16px;border-top:1px solid var(--bd);font-size:11.5px;color:var(--faint);line-height:1.7}
.foot b{color:var(--mut)}

@media(max-width:560px){
  .hd h1{font-size:24px}.grid{grid-template-columns:1fr}.proxy input{width:160px}
  .wrap{padding:16px 12px 60px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <div>
      <div class="eyebrow">Chip Control Radar</div>
      <h1>籌碼控盤雷達</h1>
      <div class="sub">技術面 × 法人籌碼 × 外資／投信控盤研判</div>
    </div>
    <div class="modebadge demo" id="modeBadge"><span class="dot"></span>範例資料</div>
  </div>

  <div class="panel">
    <div class="ph">股票清單</div>
    <textarea id="codes" placeholder="手動輸入股票代號（每行一檔，或用逗號／空白分隔），例如：2330 2454 2603&#10;也可按「匯入 CSV」讀檔；清單會自動記憶，下次打開還在"></textarea>
    <div class="opts">
      <div class="seg" id="srcSeg">
        <button data-src="demo" class="on">範例 Demo</button>
        <button data-src="live">即時 TWSE</button>
      </div>
      <label class="btn ghost" for="csv" style="display:inline-block">匯入 CSV
        <input id="csv" type="file" accept=".csv,.txt" style="display:none"></label>
      <button class="btn ghost" id="sampleBtn">貼上範例</button>
      <button class="btn ghost" id="copyBtn">複製清單</button>
      <button class="btn ghost" id="clearBtn">清除</button>
      <div class="proxy" id="proxyBox" style="display:none">CORS 代理：
        <input id="proxy" placeholder="https://corsproxy.io/?url=" /></div>
      <button class="btn primary" id="runBtn">開始分析</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="summary" id="summary" style="display:none"></div>
  <div class="filters" id="filters" style="display:none"></div>
  <div class="grid" id="grid"></div>

  <div class="foot">
    <b>說明</b>　三線多排＝MA5&gt;MA10&gt;MA20；KDJ 9 日；MACD 12/26/9；月線扣抵比較即將被扣掉的價與目前 20MA。
    控盤研判以「法人淨買超」與「當日漲跌」的相關性及漲跌日買賣量推論，<b>屬統計推論，非確定結論</b>。<br>
    色彩採台股慣例（<span class="up">紅漲</span>／<span class="down">綠跌</span>）。資料來源：臺灣證券交易所 TWSE。
    本工具僅為技術與籌碼資訊整理，<b>非投資建議</b>，據此操作之盈虧請自行負責。
  </div>
</div>

<script>/* ===================================================================
 * 分析引擎 (engine.js) — 與 Python 版 stock_analyzer.py 完全相同的計算邏輯
 * 輸入: series = {date[],open[],high[],low[],close[],volume[],
 *                 foreign_net[],trust_net[]}  (foreign/trust 單位: 股)
 * 輸出: { technical, chips }
 * =================================================================== */
(function (root) {
  const LOT = 1000;

  // ---- 基本工具 ----
  const sma = (a, n, i) => {
    if (i < n - 1) return null;
    let s = 0; for (let k = i - n + 1; k <= i; k++) s += a[k];
    return s / n;
  };
  function ema(arr, span) {
    const k = 2 / (span + 1), out = [];
    arr.forEach((v, i) => out.push(i === 0 ? v : v * k + out[i - 1] * (1 - k)));
    return out;
  }
  function rollingMin(a, n, i) { let m = Infinity; for (let k = i - n + 1; k <= i; k++) m = Math.min(m, a[k]); return m; }
  function rollingMax(a, n, i) { let m = -Infinity; for (let k = i - n + 1; k <= i; k++) m = Math.max(m, a[k]); return m; }

  // ---- KDJ (9 日)，與 Python 同步遞迴 ----
  function kdj(high, low, close, n = 9) {
    const K = [], D = [], J = []; let kp = 50, dp = 50;
    for (let i = 0; i < close.length; i++) {
      let rsv = 50;
      if (i >= n - 1) {
        const ll = rollingMin(low, n, i), hh = rollingMax(high, n, i);
        rsv = hh === ll ? 50 : (close[i] - ll) / (hh - ll) * 100;
        if (!isFinite(rsv)) rsv = 50;
      }
      kp = kp * 2 / 3 + rsv / 3;
      dp = dp * 2 / 3 + kp / 3;
      K.push(kp); D.push(dp); J.push(3 * kp - 2 * dp);
    }
    return { K, D, J };
  }

  // ---- MACD (12/26/9) ----
  function macd(close) {
    const e12 = ema(close, 12), e26 = ema(close, 26);
    const DIF = close.map((_, i) => e12[i] - e26[i]);
    const DEA = ema(DIF, 9);
    const HIST = DIF.map((v, i) => v - DEA[i]);
    return { DIF, DEA, HIST };
  }

  // ---- 最近 within 日內的金叉/死叉 (days_ago=0 為今日) ----
  function recentCross(fast, slow, within = 3) {
    const sign = fast.map((v, i) => Math.sign(v - slow[i]));
    const last = sign.length - 1;
    for (let ago = 0; ago < within; ago++) {
      const i = last - ago;
      if (i - 1 < 0) break;
      const prev = sign[i - 1], cur = sign[i];
      if (prev < 0 && cur > 0) return { kind: 'golden', ago };
      if (prev > 0 && cur < 0) return { kind: 'death', ago };
    }
    return { kind: null, ago: null };
  }

  // ---- 月線(20MA)扣抵 ----
  function ma20Deduction(close, lookAhead = 5) {
    const n = close.length;
    if (n < 21) return { available: false };
    const win = close.slice(n - 20);
    const ma20 = win.reduce((a, b) => a + b, 0) / 20;
    const deduct = close[n - 20];            // 下一交易日要被扣掉的價
    const isLow = deduct < ma20;
    const upcoming = close.slice(n - 20, n - 20 + lookAhead);
    const lowCnt = upcoming.filter(v => v < ma20).length;
    let trend;
    if (lowCnt >= lookAhead - 1) trend = '月線扣低，未來數日易上揚';
    else if (lowCnt <= 1) trend = '月線扣高，未來數日有下彎壓力';
    else trend = '扣抵值高低交錯，月線方向待確認';
    return {
      available: true, ma20: round(ma20, 2), deduct_value: round(deduct, 2),
      type: isLow ? '扣低' : '扣高', bullish: isLow,
      implication: isLow ? '月線易上揚' : '月線易下彎', trend
    };
  }

  function round(x, n) { const p = Math.pow(10, n); return Math.round(x * p) / p; }

  // ---- 技術面總成 ----
  function technicalBlock(s) {
    const { high, low, close } = s, i = close.length - 1;
    const ma5 = sma(close, 5, i), ma10 = sma(close, 10, i),
          ma20v = sma(close, 20, i), ma60 = sma(close, 60, i);
    const maBull = ma5 != null && ma10 != null && ma20v != null && ma5 > ma10 && ma10 > ma20v;
    const { K, D, J } = kdj(high, low, close);
    const { DIF, DEA, HIST } = macd(close);
    const kdC = recentCross(K, D, 3);
    const mC = recentCross(DIF, DEA, 3);
    const histNow = HIST[i], histPrev = HIST[i - 1] ?? 0;
    const color = histNow >= 0 ? 'red' : 'green';
    let barTrend;
    if (color === 'red') barTrend = histNow > histPrev ? '紅柱擴大' : '紅柱縮短';
    else barTrend = histNow < histPrev ? '綠柱擴大' : '綠柱縮短';
    return {
      ma_bullish: maBull,
      ma: { ma5: r2(ma5), ma10: r2(ma10), ma20: r2(ma20v), ma60: r2(ma60) },
      kd: { k: round(K[i], 1), d: round(D[i], 1), j: round(J[i], 1),
            k_gt_d: K[i] > D[i], cross: kdC.kind, cross_days_ago: kdC.ago },
      macd: { dif: round(DIF[i], 3), dea: round(DEA[i], 3), hist: round(histNow, 3),
              color, bar_trend: barTrend, cross: mC.kind, cross_days_ago: mC.ago },
      ma20_deduction: ma20Deduction(close)
    };
  }
  const r2 = x => x == null ? null : round(x, 2);

  // ---- 籌碼 / 控盤 ----
  function consecutive(arr) {
    if (!arr.length || arr[arr.length - 1] === 0) return 0;
    const sign = arr[arr.length - 1] > 0 ? 1 : -1; let c = 0;
    for (let i = arr.length - 1; i >= 0; i--) {
      if ((arr[i] > 0 && sign > 0) || (arr[i] < 0 && sign < 0)) c++; else break;
    }
    return c * sign;
  }
  const sum = a => a.reduce((x, y) => x + y, 0);
  const mean = a => a.length ? sum(a) / a.length : 0;
  function corr(a, b) {
    const ma = mean(a), mb = mean(b);
    let num = 0, da = 0, db = 0;
    for (let i = 0; i < a.length; i++) { num += (a[i] - ma) * (b[i] - mb); da += (a[i] - ma) ** 2; db += (b[i] - mb) ** 2; }
    if (da === 0 || db === 0) return 0;
    return num / Math.sqrt(da * db);
  }

  function chipsBlock(s) {
    const foreign = s.foreign_net.map(v => Math.round(v / LOT));
    const trust = s.trust_net.map(v => Math.round(v / LOT));
    const close = s.close;
    const ret = close.map((c, i) => i === 0 ? 0 : (c - close[i - 1]) / close[i - 1]);
    const tail = (a, n) => a.slice(Math.max(0, a.length - n));
    const summ = a => ({ today: a[a.length - 1], d5: sum(tail(a, 5)), d20: sum(tail(a, 20)), consecutive: consecutive(a) });

    const win = 20;
    const f = tail(foreign, win).map(Number), t = tail(trust, win).map(Number), r = tail(ret, win);
    const fCorr = corr(f, r), tCorr = corr(t, r);
    let fUp = 0, tUp = 0, fDown = 0, tDown = 0;
    r.forEach((rr, i) => { if (rr > 0) { fUp += f[i]; tUp += t[i]; } else if (rr < 0) { fDown += f[i]; tDown += t[i]; } });
    const periodRet = close.length > win ? (close[close.length - 1] / close[close.length - 1 - win] - 1) * 100 : 0;
    const upDriver = fUp >= tUp ? '外資' : '投信';
    const downDriver = fDown <= tDown ? '外資' : '投信';

    // 控盤研判：近20日累積淨額且與股價趨勢同向為主，相關性為信心加權
    const fNet20 = sum(f), tNet20 = sum(t);
    const trendSign = periodRet >= 0 ? 1 : -1;
    const fPos = Math.max(fNet20 * trendSign, 0) * (0.5 + Math.abs(fCorr));
    const tPos = Math.max(tNet20 * trendSign, 0) * (0.5 + Math.abs(tCorr));
    const totalForce = fPos + tPos;
    let controller, balance;
    if (totalForce <= 1e-9) { controller = '中性'; balance = 0; }
    else {
      balance = round((tPos - fPos) / totalForce, 2);
      controller = Math.abs(balance) < 0.15 ? '中性' : (fPos > tPos ? '外資' : '投信');
    }

    let verdict;

/* ── 把一段 series 變成一張卡的資料 ── */
function buildResult(code, series){
  const a = ENGINE.analyze(series);
  const c = series.close, n = c.length;
  const close = c[n-1], prev = c[n-2];
  const change = close - prev;
  return {
    code, name: series.name || code, date: series.date[n-1],
    price:{ close: round(close,2), change: round(change,2),
            change_pct: round(change/prev*100,2),
            volume_lots: Math.round(series.volume[n-1]/1000) },
    technical: a.technical, chips: a.chips
  };
}
const round=(x,n)=>{const p=Math.pow(10,n);return Math.round(x*p)/p};
const fmt = x => (x>0?'+':'') + x.toLocaleString('en-US');

function renderCard(r){

  const sigs=[];

  else if(t.macd.cross==='death') sigs.push(chip('MACD死叉·'+agoLabel(t.macd.cross_days_ago),'bear'));

/* TWSE 即時抓取：價格 STOCK_DAY + 法人 T86 */
const ROC=s=>{const[y,m,d]=s.split('/');return `${(+y)+1911}-${m}-${d}`;};
function proxify(url){const p=$('proxy').value.trim();return p?p+encodeURIComponent(url):url;}
async function jget(url){const r=await fetch(proxify(url));if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}

async function fetchPrice(code){
  const out={date:[],open:[],high:[],low:[],close:[],volume:[]};
  const today=new Date();
  for(let i=4;i>=0;i--){              // 近 5 個月
    const d=new Date(today.getFullYear(),today.getMonth()-i,1);
    const ym=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}01`;
    let j; try{ j=await jget(`https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${ym}&stockNo=${code}`);}catch(e){continue;}
    if(j.stat!=='OK'||!j.data)continue;
    const F=j.fields||[];
    const ix=name=>F.findIndex(x=>x.includes(name));
    const iO=ix('開盤'),iH=ix('最高'),iL=ix('最低'),iC=ix('收盤'),iV=ix('成交股數');
    for(const row of j.data){
      const cl=parseFloat(String(row[iC]).replace(/,/g,''));
      if(!isFinite(cl))continue;
      out.date.push(ROC(row[0]));
      out.open.push(parseFloat(String(row[iO]).replace(/,/g,''))||cl);
      out.high.push(parseFloat(String(row[iH]).replace(/,/g,''))||cl);
      out.low.push(parseFloat(String(row[iL]).replace(/,/g,''))||cl);
      out.close.push(cl);
      out.volume.push(parseInt(String(row[iV]).replace(/,/g,''))||0);
    }
  }
  return out;
}

/* T86 以「日」為單位、含全部股票；快取避免重複抓 */
const T86CACHE={};
async function fetchT86Day(yyyymmdd){
  if(T86CACHE[yyyymmdd]!==undefined)return T86CACHE[yyyymmdd];
  let j; try{ j=await jget(`https://www.twse.com.tw/fund/T86?response=json&date=${yyyymmdd}&selectType=ALL`);}catch(e){T86CACHE[yyyymmdd]=null;return null;}
  if(j.stat!=='OK'||!j.data){T86CACHE[yyyymmdd]=null;return null;}
  const F=j.fields||[];
  const iCode=F.findIndex(x=>x.includes('證券代號'));
  const iF=F.findIndex(x=>x.includes('外陸資')&&x.includes('買賣超'))>=0
            ?F.findIndex(x=>x.includes('外陸資')&&x.includes('買賣超'))
            :F.findIndex(x=>x.includes('外資')&&x.includes('買賣超'));
  const iT=F.findIndex(x=>x.includes('投信')&&x.includes('買賣超'));
  const map={};
  for(const row of j.data){
    const code=String(row[iCode]).trim();
    map[code]={ foreign: num(row[iF]), trust: num(row[iT]) };
  }
  T86CACHE[yyyymmdd]=map; return map;
}
const num=v=>parseInt(String(v).replace(/[,\s]/g,''))||0;

async function fetchLive(codes){
  if(!codes.length){setStatus('<span class="err">請先輸入股票代號</span>');return;}
  RESULTS=[];
  // 先抓近 ~30 交易日的 T86（依價格日期決定，這裡用近 40 天日曆日嘗試）
  setStatus('抓取法人資料中…');
  const dates=[];const td=new Date();
  for(let i=0;i<45;i++){const d=new Date(td);d.setDate(td.getDate()-i);
    if(d.getDay()===0||d.getDay()===6)continue;
    dates.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);}
  for(const ds of dates.slice(0,30)){ await fetchT86Day(ds); }

  let done=0;
  for(const code of codes){
    setStatus(`抓取 ${code} 價格中… (${++done}/${codes.length})`);
    let price; try{ price=await fetchPrice(code);}catch(e){price=null;}
    if(!price||price.close.length<30){
      setStatus(`<span class="err">${code} 價格資料不足或抓取失敗（可能為上櫃股或被 CORS 阻擋，試試填入 CORS 代理）</span>`);
      continue;
    }
    // 對齊法人到價格日期
    const fn=[],tn=[];
    for(const dt of price.date){
      const key=dt.replace(/-/g,'');
      const m=T86CACHE[key];
      const e=m?m[code]:null;
      fn.push(e? e.foreign*1000 : 0);   // 張->股，與引擎一致
      tn.push(e? e.trust*1000 : 0);
    }
    const series={...price, foreign_net:fn, trust_net:tn, name:code};
    RESULTS.push(buildResult(code,series));
  }
  if(RESULTS.length) setStatus(`<span class="ok">完成</span>　即時資料 ${RESULTS.length} 檔　<span style="color:var(--faint)">（法人僅含上市 T86）</span>`);
  renderAll();
}

function setStatus(html){$('status').innerHTML=html;}

/* ───────────────────── 事件 ───────────────────── */
$('srcSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
  MODE=b.dataset.src;
  $('srcSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
  const badge=$('modeBadge');
  badge.className='modebadge '+(MODE==='live'?'live':'demo');
  badge.innerHTML='<span class="dot"></span>'+(MODE==='live'?'即時 TWSE':'範例資料');
  $('proxyBox').style.display=MODE==='live'?'flex':'none';
});

$('sampleBtn').onclick=()=>{ $('codes').value=Object.keys(DEMO_DATA).join(', '); saveList(); };

// 清除：清空輸入與畫面，回到可重新分析的狀態
$('clearBtn').onclick=()=>{
  $('codes').value='';
  RESULTS=[]; ACTIVE_FILTER='all';
  $('grid').innerHTML='';
  $('summary').style.display='none'; $('filters').style.display='none';
  setStatus('已清除，請輸入新的股票清單後按「開始分析」。');
  saveList();
  $('codes').focus();
};

// 複製清單：輸出成 watchlist.txt 格式，方便貼回 GitHub 的 watchlist.txt
$('copyBtn').onclick=async()=>{
  const codes=parseCodes();
  if(!codes.length){ setStatus('<span class="err">清單是空的，沒有可複製的內容</span>'); return; }
  const text=codes.join('\n');
  try{ await navigator.clipboard.writeText(text);
    setStatus(`<span class="ok">已複製 ${codes.length} 檔</span>　（可直接貼到 GitHub 的 watchlist.txt）`);
  }catch(e){
    // 後備：無剪貼簿權限時，把內容放進輸入框讓使用者自行複製
    $('codes').value=text; setStatus('已整理成每行一檔的格式，請手動全選複製。');
  }
};

// 清單自動記憶（存在瀏覽器，讀不到時自動略過，不影響其他功能）
function saveList(){ try{ localStorage.setItem('watchlist_codes', $('codes').value); }catch(e){} }
function loadList(){ try{ return localStorage.getItem('watchlist_codes'); }catch(e){ return null; } }
$('codes').addEventListener('input', saveList);

$('csv').onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ const codes=(rd.result.match(/\d{4,6}/g)||[]).filter((v,i,a)=>a.indexOf(v)===i);
    $('codes').value=codes.join(', '); saveList(); setStatus(`已從 CSV 讀入 ${codes.length} 檔`); };
  rd.readAsText(f,'utf-8');
  e.target.value='';   // 允許重複選同一檔
};

$('runBtn').onclick=async()=>{
  const btn=$('runBtn'); btn.disabled=true;
  try{
    const codes=parseCodes();
    if(MODE==='demo') runDemo(codes);
    else await fetchLive(codes);
  }catch(e){ setStatus('<span class="err">發生錯誤：'+e.message+'</span>'); }
  finally{ btn.disabled=false; }
};

// 起始：優先載入「自動更新管線」產生的 data.js (window.__STOCK_DATA__)，
// 若不存在 (例如純本機開啟) 則退回內建範例，讓打開即看到成品。
function initFromPipeline(){
  const d = window.__STOCK_DATA__;
  if(d && d.stocks && d.stocks.length){
    RESULTS = d.stocks;
    const badge=$('modeBadge'); badge.className='modebadge live';
    badge.innerHTML='<span class="dot"></span>即時資料 · 更新 '+(d.generated_at||'');
    renderAll();
    setStatus(`<span class="ok">已載入自動更新資料</span>　${RESULTS.length} 檔　·　${d.generated_at||''}`);
  } else initDemo();
}
function initDemo(){
  if(!$('codes').value.trim()) $('codes').value=Object.keys(DEMO_DATA).join(', ');
  runDemo([]);
}
(function(){
  // 載入時先還原「記憶的清單」到輸入框（若有）
  const saved=loadList(); if(saved && saved.trim()) $('codes').value=saved;
  const s=document.createElement('script');
  s.src='data.js'; s.onload=initFromPipeline; s.onerror=initDemo;
  document.head.appendChild(s);
})();
</script>
</body>
</html>
